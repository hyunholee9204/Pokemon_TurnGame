<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Adventure Map4 - 탐험</title>
    <style>
        :root {
            --bg-dark: #121212;
            --node-gold: #ffd700;
            --hp-red: #ff4d4d;
            --panel-bg: rgba(0, 0, 0, 0.85);
            --highlight-gold: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        .map-wrapper {
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            display: flex;
            align-items: flex-start;
            scroll-behavior: smooth;
        }

        .map-content {
            position: relative;
            min-width: 4000px;
            height: 75vh;
            margin-top: 3vh;
            background-image: url('/img/어드벤처4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: rgba(42, 42, 42, 0.9);
            border: 3px solid var(--node-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform: translate(-50%, -50%);
        }

        .node:hover {
            transform: translate(-50%, -50%) scale(1.2);
            border-color: var(--highlight-gold);
            box-shadow: 0 0 25px var(--node-gold);
            z-index: 20;
        }

        .node.locked {
            filter: grayscale(100%) brightness(30%);
            cursor: not-allowed;
            border-color: #444 !important;
            box-shadow: none !important;
        }
        .node.locked:hover {
            transform: translate(-50%, -50%) scale(1);
            box-shadow: none !important;
        }

        .node.cleared {
            border-color: #00ffcc !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6) !important;
        }

        .node-label {
            position: absolute;
            bottom: -20px;
            width: 80px;
            text-align: center;
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        .node:has(.curse-node) { border: 2px solid #00ffff !important; animation: thunder-crackle 2.5s infinite ease-in-out; }
        .curse-node { position: absolute; bottom: -28px; width: 100px; text-align: center; font-size: 12px; color: #ff7f50; font-weight: bold; text-shadow: 1px 1px 3px #000;}

        .node:has(.altar-node) {
            width: 48px !important;
            height: 48px !important;
            font-size: 28px !important;
            border: 3px double #ffd700 !important;
            background: rgba(10, 20, 30, 0.95) !important;
            animation: altar-overload 1.8s infinite linear;
        }

        .altar-node {
            position: absolute;
            bottom: -32px;
            width: 120px;
            text-align: center;
            font-size: 13px;
            color: #ffd700;
            font-weight: 900;
            text-shadow: 0 0 6px #000, 0 0 4px #00ffff;
            letter-spacing: 0.5px;
        }

        .node:has(.boss-node) {
            width: 100px !important;
            height: 100px !important;
            font-size: 48px !important;
            border: 4px ridge #ffd700 !important;
            animation: thunder-boss-pulse 1.5s infinite alternate ease-in-out;
            background: rgba(10, 18, 30, 0.95) !important;
        }

        .boss-node {
            position: absolute;
            bottom: -45px;
            width: 160px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 18px;
            color: #00ffff;
            font-weight: 900;
            text-shadow: 0 0 10px #00ffff, 0 0 4px #ffd700, 2px 2px 4px #000;
            letter-spacing: 1px;
        }

        @keyframes thunder-boss-pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff;
            }
            50% {
                filter: brightness(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.05); /* 위압감 있게 부풀어 오름 */
                box-shadow: 0 0 40px #ffd700, inset 0 0 20px #ffd700; /* 황금빛 스파크 폭발 */
            }
        }

         @keyframes thunder-crackle {
            0%, 100% { box-shadow: 0 0 10px #00ffff, inset 0 0 5px #00ffff; filter: brightness(1); }
            50% { box-shadow: 0 0 25px #00bfff, inset 0 0 12px #00bfff; filter: brightness(1.1); }
        }

        @keyframes altar-overload {
            0% {
                box-shadow: 0 0 15px #00ffff, inset 0 0 8px #00ffff;
                transform: translate(-50%, -50%) scale(1.05);
            }
            40% {
                box-shadow: 0 0 30px #ffd700, inset 0 0 15px #ffd700;
                filter: brightness(1.4);
            }
            50% {
                transform: translate(-50%, -48%) scale(1.08); /* 찌릿하는 듯한 미세한 충격 */
            }
            60% {
                box-shadow: 0 0 35px #00ffff, inset 0 0 20px #00ffff;
                filter: brightness(1.2);
            }
            100% {
               box-shadow: 0 0 15px #ffd700, inset 0 0 8px #ffd700;
               transform: translate(-50%, -50%) scale(1.05);
            }
        }

        .party-status { position: fixed; bottom: 25px; left: 25px; background: var(--panel-bg); border: 2px solid #ffcc00; padding: 15px 20px; display: flex; gap: 20px; z-index: 100; border-radius: 15px; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .pokemon-card { width: 90px; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 5px; border-radius: 10px; border: 1px solid #333; }
        .pokemon-img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 3px; }
        .pokemon-name { font-size: 13px; font-weight: bold; color: #ffffff; margin-bottom: 5px; }

        .hp-numeric-display {
            font-size: 13px;
            font-weight: bold;
            color: var(--hp-red);
            background: #000000;
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid #444;
            width: 80%;
            text-align: center;
            letter-spacing: 0.5px;
            box-shadow: inset 0 0 5px rgba(255, 77, 77, 0.2);
        }

        .scroll-controls { position: fixed; bottom: 25px; left: 600px; display: flex; gap: 15px; z-index: 101; }
        .arrow-btn { background: rgba(0,0,0,0.6); border: 2px solid #fff; color: white; padding: 10px 20px; cursor: pointer; border-radius: 8px; }

        .stage-info { position: fixed; bottom: 30px; right: 40px; text-align: right; z-index: 100; }
        .stage-title { font-size: 1.4rem; color: #ffcc00; margin: 0; }
        .gold-info { font-size: 1.2rem; margin-bottom: 5px; }

        .angel-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75); display: flex; justify-content: center;
            align-items: center; z-index: 2000; backdrop-filter: blur(4px);
        }
        .angel-overlay.hidden { display: none; }

        .angel-container {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            animation: angelFloat 1.2s ease-out;
        }
        @keyframes angelFloat {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .angel-img {
            max-height: 380px; object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(255, 240, 180, 0.6));
        }
        .dialogue-box {
            width: 580px; background: rgba(10, 15, 30, 0.95);
            border: 3px solid #ffcc00; border-radius: 12px; padding: 20px 25px;
            text-align: center; box-shadow: 0 0 25px rgba(255, 204, 0, 0.25);
        }
        .dialogue-text {
            font-size: 18px; line-height: 1.6; font-weight: bold; color: #ffffff;
            margin: 0; min-height: 54px;
        }
        .dialogue-text b { color: #00ffff; }

        .btn-confirm {
            margin-top: 15px; padding: 8px 30px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #111; border: none; border-radius: 6px;
            font-weight: bold; font-size: 15px; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-confirm:hover { transform: scale(1.05); }
        .btn-confirm.hidden { display: none; }
    </style>
</head>
<body>
<div class="map-wrapper" id="mapWrapper">
    <div class="map-content" id="mapContent">
        <canvas id="mapCanvas"></canvas>

        <div class="node" id="n93" onclick="moveToNode('n93', '/game/town')" style="left: 200px; top: 50%;" data-column="0" data-next="n64,n65,n66">🏠<div class="node-label">마을</div></div>

        <div class="node" id="n94" onclick="moveToNode('n94', '/game/stage4_battle')" style="left: 500px; top: 50%;" data-column="1" data-next="n67">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n95" onclick="moveToNode('n95', '/game/stage4_battle')" style="left: 800px; top: 50%;" data-column="2" data-next="n67,n68">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n96" onclick="moveToNode('n96', '/game/stage4_battle')" style="left: 1100px; top: 50%;" data-column="3" data-next="n68">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n97" onclick="moveToNode('n97', null, true)" style="left: 1400px; top: 50%;" data-column="4" data-next="n70">💤<div class="node-label">휴식</div></div>

        <div class="node" id="n98" onclick="moveToNode('n98', '/game/stage4_battle')" style="left: 1800px; top: 50%;" data-column="5" data-next="n69">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n99" onclick="moveToNode('n99', '/game/stage4_battle')" style="left: 2100px; top: 50%;" data-column="6" data-next="n71">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n100" onclick="moveToNode('n100', '/game/stage4_battle')" style="left: 2400px; top: 50%;" data-column="7" data-next="n71">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="n101" onclick="moveToNode('n101', null, true)" style="left: 2700px; top: 50%;" data-column="8" data-next="n71">⛲<div class="node-label">휴식</div></div>

        <div class="node" id="n102" onclick="moveToNode('n102', '/game/stage4_battle')" style="left: 3000px; top: 50%;" data-column="7" data-next="n71">🗡️<div class="curse-node">성스러운 기사의 예도</div></div>

        <div class="node" id="final_boss1" onclick="moveToNode('final_boss', '/game/stage4_battle')" style="left: 3500px; top: 50%;" data-column="9">👑<div class="boss-node">천상의 군주</div></div>

        <div class="node" id="final_boss2" onclick="moveToNode('final_boss', '/game/stage4_battle')" style="left: 4000px; top: 50%;" data-column="10">👑<div class="boss-node">천상의 군주</div></div>

    </div>
</div>

<div class="party-status" id="partyStatus"></div>

<div class="scroll-controls">
    <button class="arrow-btn" onclick="scrollMap(-550)">◀</button>
    <button class="arrow-btn" onclick="scrollMap(550)">▶</button>
</div>

<div class="stage-info">
    <div class="gold-info">🪙 <span id="current-gold">0</span> G</div>
    <p class="stage-sub">Current Mission</p>
    <h1 class="stage-title">Final EP. 옥좌의 제단</h1>
</div>

<div id="angelOverlay" class="angel-overlay hidden">
    <div class="angel-container">
        <img src="/img/angel.png" class="angel-img" alt="Angel" onerror="this.src='https://i.imgur.com/gK3763A.jpeg'">
        <div class="dialogue-box">
            <p id="angelDialogue" class="dialogue-text"></p>
            <button id="angelConfirmBtn" class="btn-confirm hidden" onclick="closeAngelEvent()">가호에 감사하며..</button>
        </div>
    </div>
</div>

<script>
    const pokemonData = [
        { id: 'pika', name: '피카츄', hp: 110 },
        { id: 'pairi', name: '파이리', hp: 130 },
        { id: 'ggu', name: '꼬부기', hp: 180 },
        { id: 'seed', name: '이상해씨', hp: 150 }
    ];

    let currentLocation = 'n93';
    let hoveredNodeId = null;
    let globalPlayerTeam = [];
    let accessibleNodes = [];

    function init() {
        loadFormation();
        updateGoldUI();

        const slotId = localStorage.getItem('currentSlotId');
        if (slotId) {
            fetch('/api/slots')
            .then(res => res.json())
            .then(slots => {
                const mySlot = slots.find(s => s.slotId == parseInt(slotId));
                if (mySlot && mySlot.lastNode) {
                    currentLocation = mySlot.lastNode;
                    localStorage.setItem('currentLocation', currentLocation);
                }

                calculateAccessibleNodes();
                initHoverEvents();
                drawNodeLines();
                focusCurrentLocation();
            })
            .catch(err => {
                console.error("서버 동기화 실패, 캐시 기동", err);
                currentLocation = localStorage.getItem('currentLocation') || 'n1';
                calculateAccessibleNodes();
                initHoverEvents();
                drawNodeLines();
                focusCurrentLocation();
            });
        } else {
            calculateAccessibleNodes();
            initHoverEvents();
            drawNodeLines();
            focusCurrentLocation();
        }
    }

    function calculateAccessibleNodes() {
        accessibleNodes = [];

        document.querySelectorAll('.node').forEach(node => {
            node.classList.remove('locked', 'cleared');
        });

        const currentNodeDOM = document.getElementById(currentLocation);
        if (!currentNodeDOM) return;

        const currentColumn = parseInt(currentNodeDOM.getAttribute('data-column') || '0');

        document.querySelectorAll('.node').forEach(node => {
            const nodeColumn = parseInt(node.getAttribute('data-column') || '0');

            if (nodeColumn <= currentColumn) {
                if (node.id === currentLocation) {
                    node.classList.add('cleared');
                } else {
                    node.classList.add('locked');
                }
            }
        });

        const nextIdsStr = currentNodeDOM.getAttribute('data-next');
        if (nextIdsStr) {
            const nextNodes = nextIdsStr.split(',');
            nextNodes.forEach(id => {
                const targetNode = document.getElementById(id.trim());
                if (targetNode) {
                    accessibleNodes.push(targetNode.id);
                }
            });
        }

        document.querySelectorAll('.node').forEach(node => {
            const nodeColumn = parseInt(node.getAttribute('data-column') || '0');
            if (nodeColumn > currentColumn && !accessibleNodes.includes(node.id)) {
                node.classList.add('locked');
            }
        });
    }

    function initHoverEvents() {
        const nodes = document.querySelectorAll('.node');
        nodes.forEach(node => {
            node.addEventListener('mouseenter', () => {
                if(node.classList.contains('locked')) return;
                hoveredNodeId = node.id;
                drawNodeLines();
            });
            node.addEventListener('mouseleave', () => {
                hoveredNodeId = null;
                drawNodeLines();
            });
        });
    }

    function focusCurrentLocation() {
        const activeNode = document.getElementById(currentLocation);
        if (activeNode) {
            document.querySelectorAll('.node').forEach(n => {
                if(n.classList.contains('locked')) return;
                n.style.borderColor = "var(--node-gold)";
                n.style.boxShadow = "0 0 20px rgba(0,0,0,0.8)";
            });

            activeNode.style.borderColor = "#00ffcc";
            activeNode.style.boxShadow = "0 0 30px #00ffcc, 0 0 10px var(--node-gold)";
            activeNode.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }
    }

    function moveToNode(nodeId, targetUrl, isRest = false) {
        if (nodeId !== 'n1' && !accessibleNodes.includes(nodeId)) {
            alert("🔒 이미 선택 기회가 지나갔거나, 현재 노드와 연결되지 않은 구역입니다!");
            return;
        }

        currentLocation = nodeId;
        localStorage.setItem('currentLocation', nodeId);
        localStorage.setItem('currentBattleNodeId', nodeId);

        if (isRest) {
            syncNodeProgressToServer(nodeId);
            focusCurrentLocation();
            drawNodeLines();
            startAngelRestSequence();
            return;
        }

        if (targetUrl) {
            focusCurrentLocation();
            drawNodeLines();
            setTimeout(() => { location.href = targetUrl; }, 150);
        } else {
            syncNodeProgressToServer(nodeId);
            calculateAccessibleNodes();
            focusCurrentLocation();
            drawNodeLines();
        }
    }

    function syncNodeProgressToServer(nodeId) {
        const slotId = localStorage.getItem('currentSlotId');
        if (slotId) {
            fetch('/api/slots/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slotId: parseInt(slotId), lastNode: nodeId })
            }).catch(err => console.error("서버 통신 실패", err));
        }
    }

    /* 🎯 [수정] 자바스크립트 템플릿 엔진 렌더링 파트 개편 */
    function loadFormation() {
        const partyStatus = document.getElementById('partyStatus');
        const savedIds = localStorage.getItem('selectedFormation');

        let savedTeam = localStorage.getItem('playerTeam');
        if (savedTeam) {
            globalPlayerTeam = JSON.parse(savedTeam);
        } else {
            globalPlayerTeam = JSON.parse(JSON.stringify(pokemonData));
            globalPlayerTeam.forEach(p => p.maxHp = p.hp);
            localStorage.setItem('playerTeam', JSON.stringify(globalPlayerTeam));
        }

        if (savedIds) {
            const formationIds = JSON.parse(savedIds);
            partyStatus.innerHTML = '';
            formationIds.forEach(id => {
                const p = globalPlayerTeam.find(item => item.id === id) || pokemonData.find(item => item.id === id);
                if (p) {
                    if(!p.maxHp) p.maxHp = p.hp;

                    // 게이지 바 형태를 과감히 버리고, id="text-${p.id}"를 가진 텍스트 전용 컴포넌트로 디자인 변경
                    partyStatus.innerHTML += `
                        <div class="pokemon-card">
                            <img src="/img/${p.name}.webp" class="pokemon-img" onerror="this.src='/img/default.webp'">
                            <div class="pokemon-name">${p.name}</div>
                            <div class="hp-numeric-display" id="text-${p.id}">
                                ${p.hp} / ${p.maxHp}
                            </div>
                        </div>`;
                }
            });
        }
    }

    function drawNodeLines() {
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const content = document.getElementById('mapContent');
        const nodes = document.querySelectorAll('.node');

        canvas.width = content.offsetWidth;
        canvas.height = content.offsetHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        nodes.forEach(startNode => {
            const nextIdsStr = startNode.getAttribute('data-next');
            if (nextIdsStr) {
                const nextIds = nextIdsStr.split(',');
                nextIds.forEach(id => {
                    const endNode = document.getElementById(id.trim());
                    if (endNode) {
                        if (startNode.classList.contains('locked')) return;

                        const startX = startNode.offsetLeft;
                        const startY = startNode.offsetTop;
                        const endX = endNode.offsetLeft;
                        const endY = endNode.offsetTop;

                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);

                        if (hoveredNodeId === startNode.id) {
                            ctx.strokeStyle = "#ffffff";
                            ctx.lineWidth = 5;
                            ctx.setLineDash([]);
                            ctx.shadowColor = "var(--node-gold)";
                            ctx.shadowBlur = 15;
                        } else {
                            ctx.strokeStyle = "rgba(255, 215, 0, 0.4)";
                            ctx.lineWidth = 3;
                            ctx.setLineDash([12, 8]);
                            ctx.shadowBlur = 0;
                        }

                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                });
            }
        });
    }

    const angelQuotes = [
        "험난한 여정을 이어가는 용감한 트레이너여..",
        "잠시 무거운 짐을 내려놓고 고요한 평화를 누리소서.",
        "나의 따스한 온기가 그대들과 포켓몬들의 상처를 치유합니다.",
        "정의의 힘으로 모든 아군의 <b>체력이 20% 회복</b>되었나이다.",
        "부디 기운을 내어 눈앞의 어둠을 걷어내소서.."
    ];
    let quoteIndex = 0;

    function startAngelRestSequence() {
        quoteIndex = 0;
        document.getElementById('angelConfirmBtn').classList.add('hidden');
        document.getElementById('angelOverlay').classList.remove('hidden');
        runDialogue();
    }

    function runDialogue() {
        const dialogueTextEl = document.getElementById('angelDialogue');
        const confirmBtn = document.getElementById('angelConfirmBtn');

        if (quoteIndex < angelQuotes.length) {
            dialogueTextEl.innerHTML = angelQuotes[quoteIndex];

            if (angelQuotes[quoteIndex].includes("20% 회복")) {
                healPartyProcess();
            }

            quoteIndex++;
            setTimeout(runDialogue, 2300);
        } else {
            confirmBtn.classList.remove('hidden');
        }
    }

    /* 🎯 [수정] 천사 가호 이벤트 발생 시 실시간 수치 데이터 갱신 연동 파트 */
    function healPartyProcess() {
        globalPlayerTeam.forEach(p => {
            const healValue = Math.floor(p.maxHp * 0.2);
            p.hp = Math.min(p.maxHp, p.hp + healValue);

            // 기존의 bar 컴포넌트 제어 구문을 지우고 text 컴포넌트 내부 수치만 깔끔하게 변경
            const textFill = document.getElementById(`text-${p.id}`);
            if (textFill) {
                textFill.innerText = `${p.hp} / ${p.maxHp}`;
            }
        });
        localStorage.setItem('playerTeam', JSON.stringify(globalPlayerTeam));
    }

    let userGold = parseInt(localStorage.getItem('userGold')) || 100;
    function updateGoldUI() {
        document.getElementById('current-gold').innerText = userGold.toLocaleString();
        localStorage.setItem('userGold', userGold);
    }

    function scrollMap(distance) {
        document.getElementById('mapWrapper').scrollBy({ left: distance, behavior: 'smooth' });
    }

    window.addEventListener('load', init);
    window.addEventListener('resize', drawNodeLines);
</script>
</body>
