<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Awakening - 스킬 강화 센터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --neon-purple: #a100ff;
            --neon-blue: #00f2ff;
            --accent-gold: #ffd700;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --border-color: rgba(255, 255, 255, 0.1);
            --sidebar-purple: rgba(0, 0, 0, 0.7);
            --text-main: #e0e0e0;
        }

        body {
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(15, 15, 26, 0.95), rgba(15, 15, 26, 0.95)), url('/img/어드벤처.png');
            background-size: cover;
            color: var(--text-main);
            font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. LEFT SIDEBAR */
        .sidebar {
            width: 320px;
            background: var(--sidebar-purple);
            backdrop-filter: blur(20px);
            border-right: 2px solid var(--neon-purple);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .sidebar-title {
            font-size: 12px;
            color: var(--neon-purple);
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .party-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .party-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .party-item.active {
            border-color: var(--neon-purple);
            background: rgba(161, 0, 255, 0.15);
        }

        .party-item img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .party-item b {
            font-size: 16px;
            color: #fff;
        }

        .btn-exit {
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: auto;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .btn-exit:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* 2. MIDDLE: 스킬 장착 목록 */
        .skill-main {
            flex: 1.2;
            padding: 40px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .grid-header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .grid-header h2 {
            margin: 0;
            font-size: 24px;
            color: #fff;
        }

        .selected-list-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .selected-skill-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .selected-skill-row:hover, .selected-skill-row.active {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.08);
        }

        .row-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .row-idx {
            font-family: 'Orbitron';
            font-size: 12px;
            color: #666;
            width: 20px;
        }

        .row-name {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
        }

        .row-lvl-tag {
            font-family: 'Orbitron';
            font-size: 11px;
            font-weight: bold;
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 3. RIGHT: WORKSPACE */
        .workspace {
            flex: 1;
            padding: 40px;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-box {
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #topDetailPanel { flex: 1; }
        #bottomResultPanel { flex: 1; }

        .gold-container-bar {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--accent-gold);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
        }

        .gold-value { color: var(--accent-gold); font-family: 'Orbitron'; font-size: 18px; }

        .btn-enhance-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--neon-purple), #6a00bd);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-enhance-submit:disabled { background: #222; color: #555; border: 1px solid #333; cursor: not-allowed; }
        .btn-enhance-submit:hover:not(:disabled) { box-shadow: 0 0 15px var(--neon-purple); transform: translateY(-2px); }

        .stat-display {
            font-size: 28px; color: #fff; font-family: 'Orbitron'; font-weight: bold; margin: 10px 0;
        }

        .empty-msg { text-align: center; color: #555; font-style: italic; margin: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-title">CURRENT FORMATION</div>
    <div class="party-list" id="partyList"></div>
    <div class="btn-exit" onclick="location.href='/game/town'">마을로 이동</div>
</aside>

<main class="skill-main">
    <div class="grid-header">
        <h2 id="targetName">포켓몬을 선택하세요</h2>
        <div id="totalCounter" style="font-size: 13px; color: #888; margin-top: 5px;">장착 스킬: 0 / 20</div>
    </div>
    <div class="selected-list-box" id="skillGrid">
        <div class="empty-msg">포켓몬을 선택해 주세요.</div>
    </div>
</main>

<section class="workspace">
    <div class="panel-box" id="topDetailPanel">
        <div id="wsEmptyTop" class="empty-msg">강화할 스킬을 목록에서 선택하세요.</div>
        <div id="wsContentTop" class="hidden" style="text-align: center; width:100%;">
            <span style="color:var(--neon-blue); font-size:12px; font-weight:bold; letter-spacing:1px;">CURRENT SKILL</span>
            <h2 id="wsSkillName" style="margin: 10px 0 5px 0; color:#fff;">스킬명</h2>
            <div class="stat-display" id="statCurrent">위력 -</div>
            <div id="txtCurrentLvl" style="color: #aaa; font-size:14px; font-weight:bold;">현재 등급: Level 1</div>
        </div>
    </div>

    <div class="gold-container-bar">
        <span>보유 골드:</span>
        <span class="gold-value">🪙 <span id="myGold">10,000</span> G</span>
    </div>
    <div class="gold-container-bar" id="costGoldBar" style="border-color: var(--neon-blue);">
        <span>요구 강화 비용:</span>
        <span class="gold-value" style="color: var(--neon-blue);"><span id="neededGold">0</span> G</span>
    </div>

    <div class="panel-box" id="bottomResultPanel">
        <div id="wsEmptyBottom" class="empty-msg">위 영역에서 훈련 프로세스가 대기 중입니다.</div>
        <div id="wsContentBottom" class="hidden" style="text-align: center; width:100%;">
            <span style="color:var(--accent-gold); font-size:12px; font-weight:bold; letter-spacing:1px;">NEXT UPGRADE</span>
            <div class="stat-display" id="statNext" style="color: var(--accent-gold);">위력 -</div>
            <div id="txtNextLvl" style="color: var(--accent-gold); font-size:14px; font-weight:bold;">다음 등급: Level 2</div>
            <button class="btn-enhance-submit" id="btnEnhance" onclick="processEnhancement()">강화 실행</button>
        </div>
    </div>
</section>

<script>
    let playerGold = 10000;
    let ENHANCE_TABLE = {};
    let allPediaSkills = [];

    // 왼쪽 사이드바 연동 포켓몬 기본 정보
    const pokemonData = [
        { id: 'ggu', name: '꼬부기' },
        { id: 'pika', name: '피카츄' },
        { id: 'pairi', name: '파이리' },
        { id: 'seed', name: '이상해씨' }
    ];

    let playerSkillInstances = {};
    let currentPokemon = null;
    let selectedSkillInstance = null;

    async function initEnhanceCenter() {
        // 1. 강화 테이블 JSON 로드
        try {
            const res = await fetch('/skill_enhance.json');
            ENHANCE_TABLE = await res.json();
        } catch(e) {
            console.error("강화 테이블 JSON 로드 에러. 기본 수치로 예외 처리합니다.", e);
            // 스크립트가 멈추지 않도록 안전한 기본 구조 바인딩
            ENHANCE_TABLE = {
                "default": [
                    { level: 1, gold: 80, powerup: 1 },
                    { level: 2, gold: 150, powerup: 2 },
                    { level: 3, gold: 0, powerup: 0 }
                ]
            };
        }

        // 2. DB 원본 스킬 테이블 연동 호출
        try {
            const response = await fetch('/api/skills/pedia');
            allPediaSkills = await response.json();
        } catch (e) {
            console.error("DB 백엔드 연동 호출 오류. 예시 도감 적용", e);
            allPediaSkills = [
                { skillName: '아쿠아 볼트 프린트', power: 5, tier: 1 },
                { skillName: '미러링 타이달 쏜', power: 15, tier: 1 },
                { skillName: '하이드로 이니그마', power: 35, tier: 1 },
                { skillName: '몸통박치기', power: 5, tier: 1 }
            ];
        }

        // 3. 로컬 저장소 캐시 상태 불러오기
        const savedGold = localStorage.getItem('playerGold');
        if(savedGold) playerGold = parseInt(savedGold);
        updateGoldUI();

        const savedInstances = localStorage.getItem('playerSkillsMapData');
        if(savedInstances) playerSkillInstances = JSON.parse(savedInstances);

        // 포켓몬 사이드바 그리기 렌더링 함수 정상 호출
        renderFormation();
    }

    function updateGoldUI() {
        document.getElementById('myGold').innerText = playerGold.toLocaleString();
        localStorage.setItem('playerGold', playerGold);
    }

    function renderFormation() {
        const partyList = document.getElementById('partyList');
        // 로컬 스토리지 진형 데이터 참조 (비어있을 시 꼬부기 우선순위 배치)
        const savedIds = JSON.parse(localStorage.getItem('selectedFormation') || '["ggu", "pika", "pairi", "seed"]');

        partyList.innerHTML = '';
        savedIds.forEach((id, index) => {
            const pInfo = pokemonData.find(p => p.id === id);
            if(!pInfo) return;

            const item = document.createElement('div');
            item.className = `party-item ${currentPokemon?.id === id ? 'active' : ''}`;
            if(!currentPokemon && index === 0) {
                item.className = `party-item active`;
                currentPokemon = pInfo;
            }

            item.innerHTML = `<img src="/img/${pInfo.name}.webp" onerror="this.src='/img/꼬부기.webp'"><div><b>${pInfo.name}</b></div>`;
            item.onclick = () => {
                document.querySelectorAll('.party-item').forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                currentPokemon = pInfo;
                selectedSkillInstance = null;
                resetWorkspaceUI();
                renderSelectedSkillList();
            };
            partyList.appendChild(item);
        });

        renderSelectedSkillList();
    }

    function renderSelectedSkillList() {
        if(!currentPokemon) return;

        document.getElementById('targetName').innerText = `${currentPokemon.name} 스킬 관리`;
        const listContainer = document.getElementById('skillGrid');
        listContainer.innerHTML = '';

        const centerKey = `skills_${currentPokemon.id}`;
        const centerSavedSkills = JSON.parse(localStorage.getItem(centerKey) || '[]');

        let flattenedSkills = [];
        centerSavedSkills.forEach(skillObj => {
            for(let i = 0; i < skillObj.count; i++) {
                flattenedSkills.push(skillObj.name);
            }
        });

        document.getElementById('totalCounter').innerText = `장착 스킬: ${flattenedSkills.length} / 20`;

        if(flattenedSkills.length === 0) {
            listContainer.innerHTML = `<div class="empty-msg">장착한 스킬이 없습니다.</div>`;
            return;
        }

        flattenedSkills.forEach((skillName, index) => {
            const uniqueInstanceKey = `${currentPokemon.id}_slot_${index}_${skillName}`;
            const dbSkill = allPediaSkills.find(s => s.skillName === skillName);
            const currentTier = dbSkill ? (dbSkill.tier || 1) : 1;

            if(!playerSkillInstances[uniqueInstanceKey]) {
                const defaultBasePower = dbSkill && dbSkill.power !== undefined ? dbSkill.power : 35;

                playerSkillInstances[uniqueInstanceKey] = {
                    name: skillName,
                    level: 1, // 스킬 강화 차수의 기준은 무조건 Level 1로 고정 시작
                    basePower: defaultBasePower,
                    power: defaultBasePower
                };
            }

            const liveData = playerSkillInstances[uniqueInstanceKey];
            const row = document.createElement('div');

            const isSelected = selectedSkillInstance && selectedSkillInstance.index === index;
            row.className = `selected-skill-row ${isSelected ? 'active' : ''}`;

            row.onclick = () => selectSkillWorkspace(liveData, uniqueInstanceKey, index);

            // 스킬 리스트 내부의 배지는 기획안대로 스테이지 제한 고유 티어 값인 T1 표기 유지
            row.innerHTML = `
                <div class="row-left">
                    <span class="row-idx">${String(index + 1).padStart(2, '0')}</span>
                    <span class="row-name">${skillName}</span>
                </div>
                <span class="row-lvl-tag">T${currentTier}</span>
            `;
            listContainer.appendChild(row);
        });

        localStorage.setItem('playerSkillsMapData', JSON.stringify(playerSkillInstances));
    }

    function selectSkillWorkspace(liveData, uniqueKey, index) {
        selectedSkillInstance = { ...liveData, key: uniqueKey, index: index };
        renderSelectedSkillList();

        document.getElementById('wsEmptyTop').classList.add('hidden');
        document.getElementById('wsContentTop').classList.remove('hidden');
        document.getElementById('wsEmptyBottom').classList.add('hidden');
        document.getElementById('wsContentBottom').classList.remove('hidden');

        const currentLevel = liveData.level;

        const skillRule = ENHANCE_TABLE[liveData.name] || ENHANCE_TABLE["default"] || [];
        const currentStepRule = skillRule.find(item => item.level === currentLevel);

        document.getElementById('wsSkillName').innerText = liveData.name;
        document.getElementById('statCurrent').innerText = `위력 ${liveData.power}`;
        // 우측 패널 현재 등급 안내 -> 'Level 1' 형태로 표시 수정 완료
        document.getElementById('txtCurrentLvl').innerText = `현재 등급: Level ${currentLevel}`;

        const btn = document.getElementById('btnEnhance');

        if (currentLevel >= 3 || !currentStepRule || currentStepRule.gold === 0) {
            document.getElementById('statNext').innerText = `MAX`;
            document.getElementById('txtNextLvl').innerText = `최대 강화 레벨 도달`;
            document.getElementById('neededGold').innerText = `0`;
            btn.disabled = true;
            btn.innerText = "최대 강화 완료";
        } else {
            const bonus = currentStepRule.powerup || currentStepRule.powerBonus || 0;
            const nextPower = liveData.power + bonus;

            document.getElementById('statNext').innerText = `위력 ${nextPower}`;
            // 우측 패널 다음 등급 안내 -> 'Level 2' 형태로 표시 수정 완료
            document.getElementById('txtNextLvl').innerText = `다음 등급: Level ${currentLevel + 1}`;
            document.getElementById('neededGold').innerText = currentStepRule.gold.toLocaleString();

            if(playerGold < currentStepRule.gold) {
                btn.disabled = true;
                btn.innerText = "보유 골드 부족";
            } else {
                btn.disabled = false;
                btn.innerText = "강화 실행";
            }
        }
    }

    function processEnhancement() {
        if(!selectedSkillInstance) return;

        const targetKey = selectedSkillInstance.key;
        const liveData = playerSkillInstances[targetKey];

        const skillRule = ENHANCE_TABLE[liveData.name] || ENHANCE_TABLE["default"];
        const currentStepRule = skillRule.find(item => item.level === liveData.level);

        if (currentStepRule && playerGold >= currentStepRule.gold) {
            playerGold -= currentStepRule.gold;

            const bonus = currentStepRule.powerup || currentStepRule.powerBonus || 0;
            liveData.power += bonus;
            liveData.level += 1;

            localStorage.setItem('playerGold', playerGold);
            localStorage.setItem('playerSkillsMapData', JSON.stringify(playerSkillInstances));

            alert(`🎉 [${liveData.name}] 강화 성공! (Level ${liveData.level - 1} ➔ Level ${liveData.level})`);

            updateGoldUI();
            renderSelectedSkillList();
            selectSkillWorkspace(liveData, targetKey, selectedSkillInstance.index);
        }
    }

    function resetWorkspaceUI() {
        document.getElementById('wsEmptyTop').classList.remove('hidden');
        document.getElementById('wsContentTop').classList.add('hidden');
        document.getElementById('wsEmptyBottom').classList.remove('hidden');
        document.getElementById('wsContentBottom').classList.add('hidden');
        document.getElementById('neededGold').innerText = `0`;
    }

    window.onload = initEnhanceCenter;
</script>
</body>
</html>
